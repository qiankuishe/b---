name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build with PyInstaller
      run: |
        pyinstaller build.spec
    
    - name: Create Release Package
      run: |
        mkdir release
        copy dist\paiduiji-v1.0.0.exe release\
        copy README.md release\
        copy version.json release\
        Compress-Archive -Path release\* -DestinationPath paiduiji-v1.0.0.zip
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: paiduiji-v1.0.0.zip
        body: |
          ## B站直播间排队系统
          
          ### 使用方法
          1. 下载并解压 paiduiji-v1.0.0.zip
          2. 运行 paiduiji-v1.0.0.exe
          3. 首次运行会弹出配置向导，填写直播间信息
          4. 开始使用！
          
          ### 更新说明
          - 自动检查更新功能
          - 支持一键更新到最新版本
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
